<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Student Uni Finder 2026</title>
    <link rel="stylesheet" href="style.css" />
    <!--Use tailwindcss for easy styling-->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <!--Use lucid for icon-->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Dark/Light mode toggle - defined early so button can use it
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            console.log('Theme toggled. Dark mode:', isDark);
        }
        
        // Load saved theme immediately
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen pb-12 transition-colors duration-300">

    <header class="border-b sticky top-0 z-40 bg-white border-slate-200 dark:bg-slate-900 dark:border-slate-800 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <i data-lucide="university" class="w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">
                    UK Uni Subject Finder
                </h1>
            </div>
            <button onclick="toggleTheme()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 dark:text-amber-400">
                <i data-lucide="sun-moon" class="w-6 h-6"></i>
            </button>
        </div>
    </header>
    <main class="max-w-6xl mx-auto px-4 mt-8">
        <div class="space-y-8">
            <div class="text-center space-y-4 mb-12">
                <h2 class="text-4xl">Search the Subject Database</h2>
                <p class="text-slate-500">Instant access to Course Website and Requirements.</p>
            </div>
        <!--Making a search bar for user to search subject-->
        <div class="p-4 rounded-3xl border bg-white border-slate-200 dark:bg-slate-900 dark:border-slate-800">
            <div class="relative mb-4 flex gap-2">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-6 h-6"></i>
                    <input type="text" id="search-input" placeholder="Search courses..." class="w-full pl-12 pr-4 py-4 rounded-2xl outline-none border focus:border-indigo-500/75 bg-slate-50 dark:bg-slate-800 dark:text-white border-transparent">
                </div>
            </div>
                    <!--Make a container for filter the subject as the dataset are store in different json file-->
                    <div id="category-filters" class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                    </div>
        </div>
            <p id="results-count" class="text-sm font-medium text-slate-400 px-2">Loading courses...</p>
            <!--Make the result showing in phone and pc will have different layout-->
            <div id="results-grid" class="grid grid-cols-1 lg:grid-cols-3 gap-6"></div>
            <div id="pagination-controls"></div>
        </div>
    </main>
    <div id="course-modal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="closeModal()"></div>

    <div class="flex min-h-full items-center justify-center p-4">
        <div class="relative transform overflow-hidden rounded-3xl bg-white dark:bg-slate-900 p-8 shadow-2xl transition-all w-full max-w-2xl border border-slate-200 dark:border-slate-800">
            <button onclick="closeModal()" class="absolute right-6 top-6 p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i data-lucide="x" class="w-6 h-6 text-slate-500"></i>
            </button>

            <div id="modal-content"></div>
        </div>
    </div>
    </div>
    <!--Add a footer -->
    <footer class="mt-20 py-12 border-t border-slate-200 dark:border-slate-800">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <p class="text-slate-500 font-bold text-sm">Uni Subject Finder 2026</p>
        </div>
    </footer>
    <script src="app.js"></script>
    <!--use createicons to create lucide's icon-->
    <script>lucide.createIcons();</script>
</body>
</html>
